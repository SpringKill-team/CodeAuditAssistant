plugin.description.detail=本插件是一个代码审计辅助工具，帮助你快速定位项目中的sink点并查找调用路径。\n\n本插件的工作原理是基于PSI去构建图，通过图中的调用关系对方法的调用链进行查找。\n\n本插件包含两部分：CodeAuditAssistant以及SinkFinder。

